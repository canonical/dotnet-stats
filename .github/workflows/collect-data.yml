name: Collect data & deploy

on:
  schedule:
    # Every day at 06:00 UTC.
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      start:
        description: "Optional start date (YYYY-MM-DD) to limit the window"
        required: false
        default: ""

# Allow committing data back to the repo and deploying to GitHub Pages.
permissions:
  contents: write
  pages: write
  id-token: write

# Prevent overlapping runs.
concurrency:
  group: collect-and-deploy
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect download counts
        run: |
          if [ -n "${{ github.event.inputs.start }}" ]; then
            python scripts/collect.py --start "${{ github.event.inputs.start }}"
          else
            python scripts/collect.py
          fi

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/downloads.csv data/downloads.json data/last-run.json
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore(data): daily download counts [skip ci]"
            git push
          fi

  deploy:
    needs: collect
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Ensure we pick up the data commit from the collect job.
          ref: ${{ github.ref }}

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r web/* _site/
          mkdir -p _site/data
          cp data/downloads.json data/last-run.json _site/data/

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
